name: Build Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建 node-pty（Windows）
        if: runner.os == 'Windows'
        run: npm run rebuild

      - name: 构建 node-pty（macOS/Linux）
        if: runner.os != 'Windows'
        run: npx electron-rebuild -f -w node-pty

      - name: 验证构建
        if: runner.os == 'Windows'
        run: npm run verify:build

      - name: 打包测试
        run: npm run dist:${{ runner.os == 'Windows' && 'win' || runner.os == 'macOS' && 'mac' || 'linux' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
