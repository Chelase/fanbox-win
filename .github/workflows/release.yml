name: Release

on:
  push:
    tags:
      - 'v*'  # 推送 v 开头的 tag 时触发，如 v2.3.1
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 允许创建 Release

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_name: FanBox Setup *.exe
            asset_name: FanBox-Setup-${{ github.ref_name }}-win-x64.exe
          - os: macos-latest
            platform: mac
            artifact_name: FanBox-*.dmg
            asset_name: FanBox-${{ github.ref_name }}-arm64.dmg
          - os: ubuntu-latest
            platform: linux
            artifact_name: FanBox-*.AppImage
            asset_name: FanBox-${{ github.ref_name }}-x64.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建 node-pty（Windows）
        if: matrix.platform == 'win'
        run: npm run rebuild

      - name: 构建 node-pty（macOS/Linux）
        if: matrix.platform != 'win'
        run: npx electron-rebuild -f -w node-pty

      - name: 打包 Electron 应用
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取构建产物路径（Windows）
        if: matrix.platform == 'win'
        id: artifact-win
        shell: pwsh
        run: |
          $file = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          echo "path=$($file.FullName)" >> $env:GITHUB_OUTPUT

      - name: 获取构建产物路径（macOS）
        if: matrix.platform == 'mac'
        id: artifact-mac
        run: |
          file=$(find dist -name "*.dmg" | head -1)
          echo "path=$file" >> $GITHUB_OUTPUT

      - name: 获取构建产物路径（Linux）
        if: matrix.platform == 'linux'
        id: artifact-linux
        run: |
          file=$(find dist -name "*.AppImage" | head -1)
          echo "path=$file" >> $GITHUB_OUTPUT

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}
          path: ${{ steps.artifact-win.outputs.path || steps.artifact-mac.outputs.path || steps.artifact-linux.outputs.path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出产物
        run: find artifacts -type f

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true  # 自动生成 Release Notes
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
